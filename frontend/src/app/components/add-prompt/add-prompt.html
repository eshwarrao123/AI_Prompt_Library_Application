<div class="form-container">
    <h2>Add New Prompt</h2>

    <div class="error-banner" *ngIf="error">{{ error }}</div>

    <form [formGroup]="promptForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" formControlName="title" placeholder="e.g. Code Refactoring Assistant">
            <div class="validation-error" *ngIf="promptForm.get('title')?.touched && promptForm.get('title')?.invalid">
                <span *ngIf="promptForm.get('title')?.errors?.['required']">Title is required.</span>
                <span *ngIf="promptForm.get('title')?.errors?.['minlength']">Title must be at least 3 characters.</span>
            </div>
        </div>

        <div class="form-group">
            <label for="content">Prompt Content</label>
            <textarea id="content" formControlName="content" rows="6"
                placeholder="Enter your detailed prompt here..."></textarea>
            <div class="validation-error"
                *ngIf="promptForm.get('content')?.touched && promptForm.get('content')?.invalid">
                <span *ngIf="promptForm.get('content')?.errors?.['required']">Content is required.</span>
                <span *ngIf="promptForm.get('content')?.errors?.['minlength']">Content must be at least 20
                    characters.</span>
            </div>
        </div>

        <div class="form-group">
            <label for="complexity">Complexity (1-10)</label>
            <input type="number" id="complexity" formControlName="complexity" min="1" max="10">
            <div class="validation-error"
                *ngIf="promptForm.get('complexity')?.touched && promptForm.get('complexity')?.invalid">
                <span *ngIf="promptForm.get('complexity')?.errors?.['required']">Complexity is required.</span>
                <span
                    *ngIf="promptForm.get('complexity')?.errors?.['min'] || promptForm.get('complexity')?.errors?.['max']">
                    Complexity must be between 1 and 10.
                </span>
            </div>
        </div>

        <button type="submit" [disabled]="loading" class="submit-btn">
            {{ loading ? 'Saving...' : 'Save Prompt' }}
        </button>
    </form>
</div>
